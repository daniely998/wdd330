<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Finder | List</title>
    <meta name="author" content="Daniel Yim">
    <meta name="description" content="List page for the WDD 330 final project, Movies Finder, by Daniel Yim">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Playwrite+NZ+Basic:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=">
</head>
<body id="list-page">
    <header>
        <h1>Movies Finder</h1>
        <input type="text" id="search-bar" class="search-bar" placeholder="Search">
        <nav>
            <ul>
                <li><a href="index.html">Search Movies</a></li>
                <li><a href="list.html">Your List</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <p id="prompt" class="prompt"></p>
        <div id="display" class="display"></div>
        <dialog class="movie-detail">
            <button id="add" class="add">&plus;</button>
            <button id="remove" class="remove" style="display:none;">&minus;</button>
            <button id="close-detail" class="close-detail">&times;</button>
            <div id="message" class="message"></div>
            <div id="detail-content"></div>
        </dialog>
    </main>
    <script type="module" src="scripts/list.js"></script>
    <script type="module" src="scripts/main.js"></script>
</body>
</html>
